; BoomBot MCU 1 — minimal balance firmware (MPU-6050 + L298N only)
;   pio run -t upload      # build + flash over USB
;   pio device monitor     # watch telemetry / send tuning commands
;
; Default target: LOLIN S3 Mini (4MB flash, no OPI PSRAM) — matches the boot
; probe of the actual board ("Detected size(4096k)", "PSRAM chip not found").
; The full-size LOLIN S3 (16MB/8MB) env is kept below for reference.
[platformio]
default_envs = lolin_s3_mini

[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
build_flags = -I../common

[env:lolin_s3]
platform = espressif32
board = lolin_s3
framework = arduino
monitor_speed = 115200
build_flags = -I../common
